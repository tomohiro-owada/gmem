<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">git-mcp-memory architecture</title>
  <desc id="desc">Architecture diagram showing MCP and CLI clients, the git-mcp-memory service, Git repository, SQLite index, local ONNX embeddings, and save, search, and retry push flows.</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0 0L11 5.5L0 11Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
    <style>
      .label { font: 700 18px Inter, ui-sans-serif, system-ui, sans-serif; fill: #0f172a; }
      .body { font: 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: #475569; }
      .small { font: 12px Inter, ui-sans-serif, system-ui, sans-serif; fill: #475569; }
      .mono { font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="24" fill="#f8fafc"/>

  <g filter="url(#shadow)">
    <rect x="66" y="84" width="236" height="144" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="102" y="124" class="label">MCP client</text>
    <text x="102" y="154" class="body">AI agent / local client</text>
    <text x="102" y="184" class="mono">save_memory</text>
    <text x="102" y="206" class="mono">search_memory</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="66" y="292" width="236" height="144" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="102" y="332" class="label">CLI</text>
    <text x="102" y="362" class="body">JSON-first commands</text>
    <text x="102" y="392" class="mono">save / search</text>
    <text x="102" y="414" class="mono">sync / retry-push</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="92" width="354" height="336" rx="22" fill="#ffffff" stroke="#94a3b8"/>
    <text x="464" y="138" class="label">git-mcp-memory</text>
    <text x="464" y="168" class="body">single Go binary</text>
    <rect x="464" y="198" width="266" height="46" rx="10" fill="#ecfeff" stroke="#67e8f9"/>
    <text x="486" y="226" class="mono">Security gate</text>
    <rect x="464" y="258" width="266" height="46" rx="10" fill="#f0fdf4" stroke="#86efac"/>
    <text x="486" y="286" class="mono">Git sync + append-only write</text>
    <rect x="464" y="318" width="266" height="46" rx="10" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="486" y="346" class="mono">Embedding + vector search</text>
    <rect x="464" y="378" width="266" height="46" rx="10" fill="#fff7ed" stroke="#fdba74"/>
    <text x="486" y="406" class="mono">Structured JSON responses</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="884" y="80" width="246" height="158" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="920" y="120" class="label">Git remote</text>
    <text x="920" y="150" class="body">source of truth</text>
    <text x="920" y="180" class="mono">projects/*/*.md</text>
    <text x="920" y="202" class="small">history, diffs, recovery</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="884" y="306" width="246" height="150" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="920" y="346" class="label">SQLite index</text>
    <text x="920" y="376" class="body">local rebuildable cache</text>
    <text x="920" y="406" class="mono">metadata + vectors</text>
    <text x="920" y="428" class="small">not committed to Git</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="548" width="354" height="126" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="464" y="588" class="label">Local model cache</text>
    <text x="464" y="618" class="body">ONNX Runtime + multilingual E5 small</text>
    <text x="464" y="648" class="mono">384-dim embeddings</text>
  </g>

  <path d="M302 156H405" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M302 364H405" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="344" y="139" class="small">stdio MCP</text>
  <text x="348" y="347" class="small">JSON CLI</text>

  <path d="M774 172H868" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M884 213C842 250 813 276 779 292" fill="none" stroke="#0f766e" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <text x="805" y="152" class="small">commit + push</text>
  <text x="796" y="256" class="small">pull --rebase</text>

  <path d="M774 352H868" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M884 416C820 506 775 536 704 550" fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <text x="806" y="333" class="small">upsert/search</text>
  <text x="791" y="506" class="small">embedding</text>

  <path d="M600 548V444" stroke="#b45309" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="618" y="504" class="small">query / document vectors</text>

  <g>
    <rect x="82" y="520" width="252" height="112" rx="16" fill="#fff7ed" stroke="#fdba74"/>
    <text x="112" y="558" class="label">Failure path</text>
    <text x="112" y="588" class="body">push failed → local commit remains</text>
    <text x="112" y="614" class="body">search continues with warning</text>
  </g>
  <path d="M334 574C386 534 421 487 456 426" fill="none" stroke="#b45309" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <rect x="884" y="548" width="246" height="84" rx="16" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="920" y="582" class="label">Human review</text>
    <text x="920" y="612" class="body">Markdown, Git log, diffs</text>
  </g>
  <path d="M1007 548V456" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
