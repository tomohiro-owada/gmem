<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Save and search flow for git-mcp-memory</title>
  <desc id="desc">A flow diagram showing save and search paths through the AI client, git-mcp-memory, Git repository, SQLite index, and local embedding model.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0 0L11 5.5L0 11Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 800 30px Inter, ui-sans-serif, system-ui, sans-serif; fill: #0f172a; }
      .h { font: 700 20px Inter, ui-sans-serif, system-ui, sans-serif; fill: #0f172a; }
      .body { font: 15px Inter, ui-sans-serif, system-ui, sans-serif; fill: #475569; }
      .small { font: 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: #64748b; }
      .mono { font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
    </style>
  </defs>

  <rect width="1200" height="620" rx="28" fill="#f8fafc"/>
  <text x="600" y="62" text-anchor="middle" class="title">保存と検索で、責務を分ける</text>

  <g filter="url(#shadow)">
    <rect x="70" y="118" width="220" height="138" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="110" y="160" class="h">AI agent</text>
    <text x="110" y="192" class="mono">save_memory</text>
    <text x="110" y="218" class="mono">search_memory</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="408" y="96" width="380" height="190" rx="22" fill="#ffffff" stroke="#94a3b8"/>
    <text x="454" y="140" class="h">git-mcp-memory</text>
    <text x="454" y="172" class="body">安全性検査、Git 操作、embedding、検索</text>
    <rect x="454" y="205" width="118" height="42" rx="11" fill="#ecfeff" stroke="#67e8f9"/>
    <text x="482" y="231" class="mono">security</text>
    <rect x="596" y="205" width="118" height="42" rx="11" fill="#f0fdf4" stroke="#86efac"/>
    <text x="632" y="231" class="mono">Git</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="900" y="104" width="230" height="160" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="936" y="146" class="h">Git repo</text>
    <text x="936" y="178" class="body">Markdown が正本</text>
    <text x="936" y="206" class="mono">projects/*/*.md</text>
    <text x="936" y="232" class="small">commit / diff / rollback</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="408" y="392" width="220" height="126" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="450" y="434" class="h">Local model</text>
    <text x="450" y="466" class="body">multilingual E5 small</text>
    <text x="450" y="494" class="mono">384 dims</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="708" y="392" width="220" height="126" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="750" y="434" class="h">SQLite</text>
    <text x="750" y="466" class="body">検索用 cache</text>
    <text x="750" y="494" class="mono">metadata + vectors</text>
  </g>

  <path d="M290 174H390" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="320" y="154" class="small">MCP / CLI</text>

  <path d="M788 174H884" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="812" y="154" class="small">pull, commit, push</text>

  <path d="M596 286V376" stroke="#b45309" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="612" y="340" class="small">document/query embedding</text>

  <path d="M628 455H692" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="646" y="437" class="small">vector</text>

  <path d="M900 246C812 338 787 356 818 390" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <text x="815" y="330" class="small">reindex from Markdown</text>

  <path d="M708 472C536 568 296 465 288 238" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="438" y="554" class="small">search results + sync warnings</text>
</svg>
